openapi: 3.0.0
info:
  title: Product Catalog API
  description: A scalable product catalog API with cursor pagination, authentication, and rate limiting
  version: 1.0.0
  contact:
    name: API Support
    url: http://www.example.com/support
    email: support@example.com
servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.example.com
    description: Production server
paths:
  /api/health:
    get:
      summary: Health check endpoint
      description: Returns a simple status to check if the API is running
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
                  timestamp:
                    type: string
                    format: date-time
                    example: 2026-06-22T14:54:35.804Z
  /api/auth/login:
    post:
      summary: Login to get a JWT token
      description: Authenticate with username and password to receive a JWT token for accessing protected endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  format: password
                  example: password
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT token for authentication
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Bad request (missing username or password)
        '401':
          description: Invalid credentials
        '429':
          description: Too many login attempts (rate limited)
        '500':
          description: Internal server error
  /api/products:
    get:
      summary: Get products with cursor pagination
      description: Retrieve a paginated list of products using cursor-based pagination (keyset pagination) with optional category filtering and snapshotTime for consistent views
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of products to return per page
        - in: query
          name: cursor
          schema:
            type: string
          description: Base64 encoded cursor object { updatedAt: string, id: number } for pagination
        - in: query
          name: snapshotTime
          schema:
            type: string
            format: date-time
          description: ISO timestamp for consistent snapshot (if not provided, current time is used)
        - in: query
          name: category
          schema:
            type: string
          description: Filter products by category
      responses:
        '200':
          description: Paginated list of products
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  nextCursor:
                    type: string
                    description: Base64 encoded cursor for the next page, null if no more pages
                    nullable: true
                  snapshotTime:
                    type: string
                    format: date-time
                    description: The snapshot time used for this request (for consistency in subsequent requests)
                  hasMore:
                    type: boolean
                    description: Indicates if there are more products available
        '401':
          description: Unauthorized - missing or invalid token
        '429':
          description: Too many requests (rate limited)
        '500':
          description: Internal server error
    post:
      summary: Create a new product
      description: Create a new product in the catalog
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Invalid input data
        '401':
          description: Unauthorized - missing or invalid token
        '429':
          description: Too many requests (rate limited)
        '500':
          description: Internal server error
  /api/products/seed:
    post:
      summary: Seed the database with sample data
      description: Populate the database with 200,000 sample products (use with caution in production)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Seeding completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Seeding completed successfully
        '401':
          description: Unauthorized - missing or invalid token
        '429':
          description: Too many requests (rate limited)
        '500':
          description: Internal server error
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 200000
        name:
          type: string
          example: Product 200000
        category:
          type: string
          example: Books
        price:
          type: number
          format: float
          example: 94.8
        createdAt:
          type: string
          format: date-time
          example: 2026-06-22T14:23:06.194Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-06-22T14:23:06.194Z
    ProductInput:
      type: object
      required:
        - name
        - category
        - price
      properties:
        name:
          type: string
          example: New Product
        category:
          type: string
          example: Electronics
        price:
          type: number
          format: float
          example: 29.99
          minimum: 0
externalDocs:
  description: Find more info here
  url: http://example.com